name: Weekly Burnage Analytics Report

on:
  schedule:
    - cron: '0 11 * * 0'  # Every Sunday at 11:00 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start display server
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Build and run report generator
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          DISPLAY: :99
        run: |
          mvn compile exec:java -Dexec.mainClass="BurnageAnalyticsReportGenerator" -q

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: burnage-analytics-report
          path: burnage_analytics_report.html
          retention-days: 30

